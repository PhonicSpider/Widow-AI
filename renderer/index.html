<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="console-hidden">

  <div id="bg-layer"></div>
  <div id="ember-particles"></div>

  <!-- System console overlay — sits above ember particles, behind the orb -->
  <div id="sys-console">
    <div id="sys-console-inner"></div>
  </div>

  <button id="console-toggle" title="Toggle console">CONSOLE</button>
  <button id="dev-toggle" title="Toggle dev keyboard controls">DEV</button>

  <div id="widow-core">
    <!-- 3D Orb container — electron-orbs canvas is injected here by electron-orbs.js -->
    <div id="orb-container"></div>

    <div id="status-bar">
      <span id="status-text">DORMANT</span>
      <span id="mute-indicator">MIC OFF</span>
    </div>
  </div>

  <div id="transcript" class="console-hidden">
    <div id="transcript-inner"></div>
  </div>

  <div id="chat-bar" class="console-hidden">
    <input
      id="chat-input"
      type="text"
      placeholder="Talk to Widow..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="chat-send">SEND</button>
  </div>

  <div id="side-panel" class="hidden">
    <div class="scanlines"></div>
    <div class="panel-edge-top"></div>
    <div class="panel-edge-bottom"></div>
    <div class="panel-edge-left"></div>
    <div class="panel-edge-right"></div>
    <div class="panel-corner-bl"></div>
    <div class="panel-corner-br"></div>

    <div id="panel-header">
      <span id="panel-title">—</span>
      <div id="panel-controls">
        <span class="panel-dot"></span>
        <span class="panel-dot"></span>
        <span class="panel-dot"></span>
      </div>
    </div>
    <div id="panel-content"></div>
    <webview id="panel-webview" class="hidden" src="about:blank" allowpopups partition="persist:panel"></webview>
  </div>

  <script src="js/orb3d.js"></script>
  <script src="js/electron-orbs.js"></script>
  <script src="js/cat-headphones.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
